<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'amant 情人美學 | 教育培訓</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #D7cfc8;
            --primary-title: #524941;
            --main-text: #6d635a;
            --card-bg: #fdfcfb;
            --accent-color: #bfaea0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--main-text);
            font-family: 'Noto Serif TC', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        /* 導覽選單 */
        nav {
            position: sticky;
            top: 0;
            background-color: rgba(215, 207, 200, 0.9);
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 15px 0;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .nav-link {
            text-decoration: none;
            color: var(--primary-title);
            margin: 0 10px;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 5px 12px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .nav-link:hover {
            background-color: var(--accent-color);
            color: white;
        }

        /* 容器 */
        .container {
            max-width: 800px;
            width: 90%;
            padding: 40px 0;
        }

        section {
            display: none; /* 預設隱藏，由 JS 控制顯示 */
            animation: fadeIn 0.5s ease-in-out;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 字卡排版 */
        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1, h2, h3 {
            color: var(--primary-title);
            margin-top: 0;
        }

        .slogan {
            font-size: 1.1rem;
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-style: italic;
        }

        /* 按鈕風格 */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 15px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            filter: brightness(0.9);
        }

        .footer-btns {
            margin-top: 50px;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 30px;
        }

        /* 列表風格 */
        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin-bottom: 10px;
            position: relative;
            padding-left: 20px;
        }

        li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-color);
        }

        .day-title {
            font-weight: bold;
            color: var(--primary-title);
            display: block;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-link" onclick="showPage('overview')">課程總覽</a>
        <a href="#" class="nav-link" onclick="showPage('internship')">實習機制</a>
        <a href="#" class="nav-link" onclick="showPage('course-8days')">八天系統課</a>
        <a href="#" class="nav-link" onclick="showPage('registration')">報名流程</a>
        <a href="#" class="nav-link" onclick="showPage('qa')">Q&A</a>
    </nav>

    <div class="container">
        
        <section id="overview" class="active">
            <div class="card">
                <p class="slogan">— 從零基
